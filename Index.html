<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        
    body{
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        flex-direction: column;
        background: linear-gradient(to bottom right, #12063b, #09555c);

    #form-box{
            background: rgba(250, 250, 250, 0.80);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 425px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);   
        }

    h2 {
        text-align: center;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .btn-primary {
        transition: all 0.2s ease;
    }

    .btn-info:hover {
        background: rgba(250, 250, 250, 0.80);
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    </style>

</head>
<body>

    <div id="form-box">
         <h2>Hi there! Log in to your account!</h2>

    <br>

    <form>
        <h2>Login Form</h2>
        <label for="uname">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>

        <label for="pwd">Username</label>
            <br>
            <input type="text" id="pwd" class="form-control" placeholder="Enter here" required>
            <br> 

        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">

        <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>
        <p id="display" class="text-center display-6"></p>
    </div>

    <p id="display"></p>

    <script>
        let attempt_counter = 0;

        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";
        



        while (attempt_counter < 3) {
        if (username === "mrbeast67" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";

            break; // stop loop
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
          }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
           
        }
    }
    </script>
    
</body>
</html>
