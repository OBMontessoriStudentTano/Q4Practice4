<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        
    body{
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        flex-direction: column;
        background-image: url("https://i.pinimg.com/736x/5e/2d/e4/5e2de404861dbf7a30ce923d07ca1fbe.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    #form-box{
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.20);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            width: 410px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.5);   
        }

    #form-box2{
        background: rgba(255, 255, 255, 0.20);
        backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 20px;
        width: 410px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.5);
    }

    h1 {
        text-align: center;
        font-size: 25px;
        font-weight: bold;
        color: black;
        margin-bottom: 20px;
    }

    .btn-primary {
        transition: all 0.2s ease;
    }

    .btn-info:hover {
        background: rgba(250, 250, 250, 0.80);
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .btn-info {
        background-color: #899287;
        border: none;
        color: white;
        transition: 0.2s ease;
        border: 2px solid black;
    }

    .btn-info:hover {
        background-color: #6c7969;
        border: 2px solid white;
        box-shadow: 0 0 10px #aab4a9;
    }

    </style>

</head>
<body>
    <div id="form-box2">

    <br>


    <form>
         <h1>Welcome to our login form! Login in:</h1>
    </form>
    </div>

    <br>

    <br>

    <br>

    <div id="form-box">

    <form>
        <label for="uname">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>

        <label for="pwd">Password</label>
            <br>
            <input type="text" id="pwd" class="form-control" placeholder="Enter here" required>
            <br> 

        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
        <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>
    </div>

    <p id="display"></p>

    <script>
        let attempt_counter = 0;

        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";
        



        while (attempt_counter < 3) {
        if (username === "mrbeast67" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";

            break; // stop loop
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
          }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
           
        }
    }
    </script>
    
</body>
</html>
